{% extends 'base.html' %}

 {% block contenido %}
<div class="d-flex justify-content-between align-items-center mb-4">
  <div>
    <h1 class="mb-0"> Panel de Bodega</h1>
    <small class="text-muted">Sesión activa: <strong>{{ usuario }}</strong></small>
  </div>

  <a href="{% url 'logout_bodega' %}" class="btn btn-outline-danger">Cerrar sesión</a>
</div>

<div class="row">
  <div class="col-md-4">
    <div class="card text-white bg-secondary">
      <div class="card-body">
        <h5 class="card-title">Total de movimientos</h5>
        <p class="card-text display-6"> {{ total_movimientos }} </p>
    </div>
  </div>
</div>
 {% endblock %}
