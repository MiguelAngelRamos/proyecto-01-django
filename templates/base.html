<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block titulo %}Minimarket "Sofia"{% endblock %}</title>
  <!-- Begin CDN Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <!-- End CDN Bootstrap 5 -->
   {% load static %}
   <link rel="stylesheet" href="{% static 'css/estilos.css' %}">
  
</head>
<body class="bg-light d-flex flex-column min-vh-100">
  <!-- Begin Navbar -->
   <nav class="navbar navbar-dark bg-dark mb-4">
    <div class="container">
      <a href="/" class="navbar-brand">Minimarket "Sofia"</a>
      <div>
        <a href="/" class="btn btn-outline-light btn-sm me-2"> Cátalogo </a>
        <a href="/bodega/" class="btn btn-outline-warning btn-sm"> Bodega </a>
      </div>
    </div>
   </nav>
  <!-- End Navbar -->

  <main class="container flex-grow-1">
    {% block contenido %}{% endblock %}
  </main>

  <footer class="text-center mt-5 py-3 border-top">
    {% block footer %} &copy; 2026 Minimarket "Sofia". All rights reserved. {% endblock %}
  </footer>
</body>
</html>
