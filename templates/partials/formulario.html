<div class="card shadow sm mb-4">
  <div class="card-header bg-primary text-white">
    <h5 class="card-title mb-0">Registro Nuevo Producto</h5>
  </div>
  <div class="card-body">
    <!-- Aquí irá el formulario -->
    <form method="POST">
      {% csrf_token %}
      <div class="row g-3">
        <div class="col-xl-4">
          <input type="text" name="nombre" class="form-control" placeholder="Nombre" required>
        </div>
        <div class="col-xl-2">
          <input type="number" name="precio" class="form-control" placeholder="Precio" step="any" required>
        </div>
        <div class="col-xl-2">
          <input type="number" name="stock" class="form-control" placeholder="Stock" required>
        </div>
        <div class="col-xl-2">
          <select name="categoria" class="form-select" required>
            <option value="" disabled selected>Selecciona Categoría</option>
            <option value="Abarrotes">Abarrotes</option>
            <option value="Limpieza">Limpieza</option>
            <option value="Bebidas">Bebidas</option>
            <option value="Dulces">Dulces</option>
            <option value="Lácteos">Lácteos</option>
          </select>
        </div>
        <div class="col-xl-2">
          <button type="submit" class="btn btn-success w-100">Agregar Producto</button>
        </div>
    </form>
  </div>
</div>
